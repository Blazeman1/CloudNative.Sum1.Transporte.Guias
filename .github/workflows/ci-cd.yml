name: CI/CD - Build, Push Docker Hub y Deploy EC2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/transporte-guias
  APP_PORT: 8080

jobs:
  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: mvn clean package -DskipTests

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "=== [1/5] Pulling imagen desde Docker Hub ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/transporte-guias:latest

            echo "=== [2/5] Deteniendo contenedor anterior ==="
            docker stop transporte-guias || true
            docker rm   transporte-guias || true

            echo "=== [3/5] Iniciando nuevo contenedor ==="
            docker run -d \
              --name transporte-guias \
              --restart unless-stopped \
              -p 8080:8080 \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              -v /mnt/efs/guias_tmp:/app/efs/guias_tmp \
              ${{ secrets.DOCKERHUB_USERNAME }}/transporte-guias:latest

            echo "=== [4/5] Esperando que la app esté lista ==="
            sleep 20
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/api/guias/health; then
                echo "App OK"
                break
              fi
              echo "Intento $i/12..."
              sleep 5
            done

            echo "=== [5/5] Limpiando imágenes antiguas ==="
            docker image prune -f

            echo "Deploy completado"
