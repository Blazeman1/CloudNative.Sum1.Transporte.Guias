name: CI/CD - Build, Push Docker Hub y Deploy EC2

# Se activa con push o pull_request a la rama principal
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Nombre de imagen en Docker Hub: usuario/nombre-imagen
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/transporte-guias
  # Puerto expuesto en la instancia EC2
  APP_PORT: 8080

jobs:
  # ══════════════════════════════════════════════════════════════════
  # JOB 1: Build, test y push de la imagen Docker a Docker Hub
  # ══════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código fuente
      - name: Checkout código fuente
        uses: actions/checkout@v4

      # 2. Configurar JDK 17 para ejecutar tests con Maven
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3. Compilar y ejecutar tests unitarios
      - name: Compilar y ejecutar tests
        run: mvn clean verify -DskipTests=false
        # Si los tests fallan, el pipeline se detiene aquí

      # 4. Login a Docker Hub con secretos del repositorio
      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Configurar buildx para soporte multi-plataforma
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. Extraer metadatos (tags y labels) para la imagen
      - name: Extraer metadatos Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      # 7. Build y Push de la imagen Docker
      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha      # Cache de GitHub Actions para builds más rápidos
          cache-to:   type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════
  # JOB 2: Deploy automático en EC2 (solo en push a main/master)
  # ══════════════════════════════════════════════════════════════════
  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push          # Solo corre si el build fue exitoso
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      # 1. Conectar a EC2 vía SSH y ejecutar comandos de despliegue
      - name: Deploy en EC2 vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}        # IP pública o DNS de la instancia EC2
          username: ${{ secrets.EC2_USER }}         # Usuario SSH (ec2-user, ubuntu, etc.)
          key:      ${{ secrets.EC2_SSH_KEY }}      # Clave privada PEM sin passphrase
          port:     22
          script: |
            set -e  # Abortar si cualquier comando falla

            echo "=== [1/5] Actualizando imagen Docker desde Docker Hub ==="
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "=== [2/5] Deteniendo contenedor anterior (si existe) ==="
            docker stop transporte-guias || true
            docker rm   transporte-guias || true

            echo "=== [3/5] Iniciando nuevo contenedor ==="
            docker run -d \
              --name transporte-guias \
              --restart unless-stopped \
              -p ${{ env.APP_PORT }}:8080 \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              -v /mnt/efs/guias_tmp:/app/efs/guias_tmp \
              ${{ env.DOCKER_IMAGE }}:latest

            echo "=== [4/5] Esperando que la aplicación esté lista ==="
            sleep 15
            # Health check: esperar hasta 60 segundos
            for i in $(seq 1 12); do
              if curl -sf http://localhost:${{ env.APP_PORT }}/api/guias/health; then
                echo "✅ Aplicación respondiendo correctamente"
                break
              fi
              echo "Intento $i/12 - esperando..."
              sleep 5
            done

            echo "=== [5/5] Limpiando imágenes antiguas ==="
            docker image prune -f

            echo "✅ Deploy completado exitosamente"
